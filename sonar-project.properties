# SonarQube project configuration for fuse
sonar.projectKey=fuse
sonar.projectName=fuse
sonar.host.url=http://localhost:9000

# Source layout
sonar.sources=.
sonar.tests=.
sonar.test.inclusions=**/*_test.go,**/testmain_test.go
sonar.exclusions=vendor/**,bin/**,.agents/**,testdata/**,.sonarqube/**

# Go coverage
sonar.go.coverage.reportPaths=coverage.out

# Encoding
sonar.sourceEncoding=UTF-8
