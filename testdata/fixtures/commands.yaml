  - command: "docker ps"
    expected: "SAFE"
    description: "docker ps is conditionally safe"
  - command: "az account show"
    expected: "SAFE"
    description: "az account show is conditionally safe"
  - command: "git diff"
    expected: "SAFE"
    description: "git diff is conditionally safe"
  - command: "docker images"
    expected: "SAFE"
    description: "docker images is conditionally safe"
  - command: "docker logs my-container"
    expected: "SAFE"
    description: "docker logs is conditionally safe"

  # =======================================================================
  # Hardcoded BLOCKED commands
  # =======================================================================
  - command: "rm -rf /"
    expected: "BLOCKED"
    description: "catastrophic recursive force-remove root"
  - command: "rm -r -f /"
    expected: "BLOCKED"
    description: "split flags recursive force-remove root"
  - command: "rm --recursive --force /"
    expected: "BLOCKED"
    description: "long flags recursive force-remove root"
  - command: "rm -r --force /"
    expected: "BLOCKED"
    description: "mixed flags recursive force-remove root"
  - command: "rm -rf $HOME"
    expected: "BLOCKED"
    description: "recursive force-remove HOME variable"
  - command: "rm -rf ${HOME}"
    expected: "BLOCKED"
    description: "recursive force-remove HOME braces variable"
  - command: "rm -rf /*"
    expected: "BLOCKED"
    description: "recursive force-remove wildcard root contents"
  - command: "rm -f -r /"
    expected: "BLOCKED"
    description: "split flags reverse-order recursive force-remove root"
  - command: "rm --force --recursive /"
    expected: "BLOCKED"
    description: "long flags reverse-order recursive force-remove root"
  - command: "rm --recursive -f /"
    expected: "BLOCKED"
    description: "mixed flags reverse-order recursive force-remove root"
  - command: "mkfs.ext4 /dev/sda1"
    expected: "BLOCKED"
    description: "filesystem formatting"
  - command: "mkswap /dev/nvme0n1p2"
    expected: "BLOCKED"
    description: "swap formatting on block device"
  - command: "dd if=/dev/zero of=/dev/sda"
    expected: "BLOCKED"
    description: "raw disk overwrite via dd"
  - command: "echo zero > /dev/sdb"
    expected: "BLOCKED"
    description: "redirect overwrite to raw block device"
  - command: "bash -c ':(){ :|:& };:'"
    expected: "BLOCKED"
    description: "fork bomb through bash -c inner command extraction"
  - command: "chmod 777 /"
    expected: "BLOCKED"
    description: "chmod world-writable root"
  - command: "chown -R root:root /"
    expected: "BLOCKED"
    description: "recursive chown of root filesystem"
  - command: "fuse disable"
    expected: "BLOCKED"
    description: "fuse self-protection disable"
  - command: "fuse uninstall"
    expected: "BLOCKED"
    description: "fuse self-protection uninstall"
  - command: "fuse enable"
    expected: "BLOCKED"
    description: "fuse self-protection enable"
  - command: "sudo fuse disable"
    expected: "BLOCKED"
    description: "sudo fuse disable still BLOCKED"
  - command: "cat > ~/.fuse/config/policy.yaml << EOF"
    expected: "BLOCKED"
    description: "write to fuse config directory remains blocked even on unclosed heredoc"
  - command: "cp policy.yaml ~/.fuse/config/policy.yaml"
    expected: "BLOCKED"
    description: "copy into fuse config directory"
  - command: "echo '{}' > .claude/settings.json"
    expected: "BLOCKED"
    description: "overwrite Claude Code settings"
  - command: "rm -rf ~/.fuse/state"
    expected: "BLOCKED"
    description: "delete fuse state directory"
  - command: "rm .claude/settings.json"
    expected: "BLOCKED"
    description: "delete Claude Code settings file"
  - command: "sqlite3 ~/.fuse/state/fuse.db 'SELECT * FROM approvals'"
    expected: "SAFE"
    description: "read-only fuse database access is allowed"
  - command: "sqlite3 ~/.fuse/state/fuse.db 'DELETE FROM events'"
    expected: "BLOCKED"
    description: "destructive fuse database access is blocked"
  - command: "python -c \"import shutil; shutil.rmtree('~/.fuse/config')\""
    expected: "BLOCKED"
    description: "inline interpreter targeting fuse-managed files"
  - command: "perl -e 'print q(secret.key)'"
    expected: "BLOCKED"
    description: "inline interpreter references fuse-managed secret key"
  - command: "rm -rf ./build-cache"
    expected: "CAUTION"
    description: "recursive force-remove relative path stays gated but not hard-blocked"
  - command: "rm --recursive --force dist"
    expected: "SAFE"
    description: "long-flag recursive force-remove of safe build directory"
  - command: "sqlite3 app.db 'SELECT 1'"
    expected: "SAFE"
    description: "ordinary sqlite database query remains safe"

  # =======================================================================
  # Built-in CAUTION commands
  # =======================================================================
  - command: "git push --force origin main"
    expected: "CAUTION"
    description: "git force push"
  - command: "git restore README.md"
    expected: "CAUTION"
