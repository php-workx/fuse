    expected: "APPROVAL"
    description: "aws sqs delete queue"
  - command: "aws kms schedule-key-deletion --key-id abc"
    expected: "APPROVAL"
    description: "aws kms schedule key deletion"
  - command: "aws ec2 delete-security-group --group-id sg-123"
    expected: "APPROVAL"
    description: "aws ec2 delete security group"

