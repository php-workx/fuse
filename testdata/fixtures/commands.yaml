  # =======================================================================
  # Normalization and absolute path tests
  # =======================================================================
  - command: "/usr/bin/rm -rf /"
    expected: "BLOCKED"
    description: "absolute path rm -rf root"
  - command: "/usr/local/bin/terraform destroy"
    expected: "CAUTION"
    description: "absolute path terraform destroy"

  # =======================================================================
  # Compound command tests
  # =======================================================================
  - command: "echo safe && rm -rf /"
    expected: "BLOCKED"
    description: "compound command BLOCKED wins"
  - command: "echo safe; terraform destroy"
    expected: "CAUTION"
    description: "compound command most restrictive wins"
  - command: "echo safe\nterraform destroy"
    expected: "CAUTION"
    description: "newline as command separator"
  - command: "cd /tmp && python destructive_script.py"
    expected: "APPROVAL"
    description: "compound block cwd-changing builtin before file-backed command"

  # =======================================================================
  # Sensitive env var prefix tests
