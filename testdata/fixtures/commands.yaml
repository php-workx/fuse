  - command: "PATH=/evil:$PATH terraform plan"
    expected: "APPROVAL"
    description: "PATH= prefix is a security-sensitive env var assignment"
  - command: "LD_PRELOAD=/evil.so ls"
    expected: "APPROVAL"
    description: "LD_PRELOAD= prefix is a security-sensitive env var assignment"

