version: 2

project_name: fuse

before:
  hooks:
    - go mod tidy

builds:
  - id: fuse
    main: ./cmd/fuse
    binary: fuse
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      # Windows excluded from release builds until code signing is resolved.
      # Use `just build-windows` for local testing. See specs/windows-support-plan.md.
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/php-workx/fuse/internal/cli.Version={{.Version}}
      - -X github.com/php-workx/fuse/internal/cli.GitCommit={{.Commit}}
      - -X github.com/php-workx/fuse/internal/cli.BuildDate={{.Date}}

archives:
  - id: default
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

nfpms:
  - id: linux-packages
    package_name: fuse
    vendor: php-workx
    homepage: https://github.com/php-workx/fuse
    maintainer: Ronny Unger <phpworkx@gmail.com>
    description: A local firewall for AI agent commands
    license: MIT
    formats:
      - deb
      - rpm
      - apk
    bindir: /usr/bin
    contents:
      - src: LICENSE
        dst: /usr/share/doc/fuse/LICENSE
    overrides:
      deb:
        dependencies: []
      rpm:
        dependencies: []

brews:
  - repository:
      owner: php-workx
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: https://github.com/php-workx/fuse
    description: A local firewall for AI agent commands
    license: MIT
    install: |
      bin.install "fuse"
    test: |
      system "#{bin}/fuse", "--help"

release:
  github:
    owner: php-workx
    name: fuse
  draft: false
  prerelease: auto
