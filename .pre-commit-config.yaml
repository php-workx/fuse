exclude: ^testdata/fixtures/

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=500"]

  - repo: https://github.com/betterleaks/betterleaks
    rev: v1.1.2
    hooks:
      - id: betterleaks-system

  - repo: local
    hooks:
      - id: format-check
        name: format check
        entry: bash ./scripts/check-format.sh
        language: system
        files: '(^|/).+\.go$'
      - id: workflow-lint
        name: workflow lint
        entry: bash ./scripts/check-workflows.sh
        language: system
        pass_filenames: false
        files: '^\.github/workflows/.*\.(yml|yaml)$'
      - id: go-test
        name: go test
        entry: go test -count=1 ./...
        language: system
        pass_filenames: false
        files: '(^|/)(.*\.go|go\.mod|go\.sum|Makefile)$'
      - id: golangci-lint
        name: golangci-lint
        entry: golangci-lint run
        language: system
        pass_filenames: false
        files: '(^|/)(.*\.go|go\.mod|go\.sum|Makefile|\.golangci\.yml)$'
      - id: pre-push-suite
        name: pre-push suite
        entry: bash ./scripts/check-pre-push.sh
        language: system
        pass_filenames: false
        stages: [pre-push]
