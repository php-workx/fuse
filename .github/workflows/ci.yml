name: Pull Request Checks

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.24.12"

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install goimports
        run: go install golang.org/x/tools/cmd/goimports@v0.38.0

      - name: Check formatting
        run: bash ./scripts/check-format.sh

  module-hygiene:
    name: Module Hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Verify go.mod and go.sum are tidy
        shell: bash
        run: |
          set -euo pipefail
          go mod tidy
          git diff --exit-code -- go.mod go.sum

  workflow-lint:
    name: Workflow Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.8

      - name: Lint GitHub Actions workflows
        run: bash ./scripts/check-workflows.sh

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Install gotestfmt
        run: go install github.com/gotesttools/gotestfmt/v2/cmd/gotestfmt@v2.5.0

      - name: Run tests with race detector
        shell: bash
        run: |
          set -euo pipefail
          go test -race -count=1 -json -coverprofile=coverage.out -covermode=atomic ./... \
            2>&1 | tee /tmp/gotest.log | gotestfmt

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-out
          path: coverage.out
          if-no-files-found: error

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.out
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: php-workx/fuse

      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gotest-log
          path: /tmp/gotest.log
          if-no-files-found: ignore

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.out
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      NOLINT_BUDGET: "4"
      NOSEC_BUDGET: "0"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Enforce suppression budgets
        shell: bash
        run: |
          set -euo pipefail

          nolint_count="$( (git grep -n '//nolint' -- '*.go' || true) | wc -l | tr -d '[:space:]' )"
          nosec_count="$( (git grep -n '#nosec' -- '*.go' || true) | wc -l | tr -d '[:space:]' )"

          echo "Current //nolint count: ${nolint_count} (budget: ${NOLINT_BUDGET})"
          echo "Current #nosec count: ${nosec_count} (budget: ${NOSEC_BUDGET})"

          if [ "${nolint_count}" -gt "${NOLINT_BUDGET}" ]; then
            echo "Error: //nolint count exceeded budget."
            exit 1
          fi

          if [ "${nosec_count}" -gt "${NOSEC_BUDGET}" ]; then
            echo "Error: #nosec count exceeded budget."
            exit 1
          fi

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.3

  vuln:
    name: Vulnerability Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

      - name: Run govulncheck
        run: govulncheck ./...

  compat:
    name: Shell Compatibility
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install shells (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y zsh fish

      - name: Install shells (macOS)
        if: runner.os == 'macOS'
        run: brew install fish

      - name: Run compatibility release checks
        run: |
          FUSE_RELEASE_CHECK=1 go test ./internal/releasecheck \
            -count=1 \
            -run 'TestReleaseCheckShellWrapperCompatibility|TestReleaseCheckLocaleInvariantClassification' \
            -v

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - format
      - module-hygiene
      - workflow-lint
      - test
      - lint
      - vuln
      - compat
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Cross-build binaries
        run: make build-all
