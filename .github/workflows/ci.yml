name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install tools
        run: just install-dev

      - name: Run quality gate (fmt, vet, lint, build, mod-tidy, actionlint, test, vuln)
        run: just check-local

      - name: Enforce suppression budgets
        run: just budgets

      - name: Upload coverage artifact
        if: always()
        run: |
          go test -race -count=1 -coverprofile=coverage.out -covermode=atomic ./... || true
        continue-on-error: true

      - name: Upload coverage reports to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.out
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: php-workx/fuse

  compat:
    name: Shell Compatibility
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install shells (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y zsh fish

      - name: Install shells (macOS)
        if: runner.os == 'macOS'
        run: brew install fish

      - name: Run compatibility release checks
        run: |
          FUSE_RELEASE_CHECK=1 go test ./internal/releasecheck \
            -count=1 \
            -run 'TestReleaseCheckShellWrapperCompatibility|TestReleaseCheckLocaleInvariantClassification' \
            -v

  windows-check:
    name: Windows Cross-Compile Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.3

      - name: Vet (GOOS=windows)
        run: GOOS=windows GOARCH=amd64 just vet

      - name: Lint (GOOS=windows)
        run: just lint-windows-check

      - name: Build (GOOS=windows)
        run: GOOS=windows GOARCH=amd64 just build-check

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - check
      - compat
      - windows-check
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Cross-build binaries
        run: just build-all

  trufflehog:
    name: Secret Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --results=verified,unknown
